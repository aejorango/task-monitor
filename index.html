<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Security hardening for strict corporate web proxies. Static hosts
         (GitHub Pages) can't set HTTP response headers, so these meta tags are
         the equivalent. `upgrade-insecure-requests` forces every sub-resource
         to HTTPS (no mixed content) without restricting any origins, so it's
         safe for Firebase / Google sign-in / Anthropic API calls. -->
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="icon" type="image/webp" href="blueinnov_logo.webp" />
    <link rel="shortcut icon" type="image/webp" href="blueinnov_logo.webp" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#5b4fff" />
    <link rel="apple-touch-icon" href="blueinnov_logo.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Monitor · Blue Innovation</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
